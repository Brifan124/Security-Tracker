# 1. Database Connection Link (We will use a new database named security_tracker)
spring.datasource.url=jdbc:postgresql://localhost:5432/security_tracker?createDatabaseIfNotExist=true
spring.datasource.username=your_username
spring.datasource.password=your_password

# 2. Driver configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Hibernate Configuration (Tells Hibernate to automatically create the tables for us)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
